<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">闇豚の塔 画面説明</title>
  <desc id="desc">ゲーム画面の左、中央、右の役割を説明する図</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2028aa"/>
      <stop offset="0.55" stop-color="#111a82"/>
      <stop offset="1" stop-color="#08104f"/>
    </linearGradient>
    <style>
      .bg { fill: #030617; }
      .panel { fill: url(#panel); stroke: #f8f7ff; stroke-width: 4; }
      .soft { fill: #0a1255; stroke: #95a8ff; stroke-width: 2; }
      .title { fill: #fff0a8; font: 700 24px sans-serif; }
      .label { fill: #fff0a8; font: 700 18px sans-serif; }
      .text { fill: #f8f7ff; font: 15px sans-serif; }
      .small { fill: #bfc8ff; font: 13px sans-serif; }
      .button { fill: #17228f; stroke: #f8f7ff; stroke-width: 2; }
      .arrow { stroke: #79e2ff; stroke-width: 4; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#79e2ff"/>
    </marker>
  </defs>

  <rect class="bg" width="980" height="520"/>
  <text class="title" x="32" y="42">闇豚の塔: 画面の見方</text>

  <rect class="panel" x="28" y="70" width="210" height="390" rx="6"/>
  <text class="label" x="48" y="105">左: 進行パネル</text>
  <rect class="soft" x="48" y="125" width="170" height="54" rx="4"/>
  <text class="text" x="64" y="148">第◯T / 内政</text>
  <text class="small" x="64" y="168">現在のターンとフェーズ</text>
  <rect class="soft" x="48" y="198" width="56" height="160" rx="4"/>
  <rect fill="#79e2ff" x="62" y="298" width="28" height="48"/>
  <text class="small" x="118" y="260">塔の進行度</text>
  <rect class="button" x="48" y="378" width="76" height="34" rx="3"/>
  <text class="small" x="65" y="400">探索へ</text>
  <rect class="button" x="140" y="378" width="78" height="34" rx="3"/>
  <text class="small" x="158" y="400">建築</text>
  <text class="small" x="48" y="435">移動、帰還、イベント処理</text>

  <rect class="panel" x="270" y="70" width="330" height="390" rx="6"/>
  <text class="label" x="292" y="105">中央: パーティパネル</text>
  <rect class="soft" x="292" y="126" width="286" height="110" rx="4"/>
  <text class="text" x="312" y="154">前衛</text>
  <circle fill="#fff0a8" cx="386" cy="154" r="18"/>
  <circle fill="#f8f7ff" cx="454" cy="154" r="18"/>
  <text class="small" x="312" y="196">HP / AP / 行動ボタン</text>
  <rect class="soft" x="292" y="258" width="286" height="110" rx="4"/>
  <text class="text" x="312" y="286">後衛</text>
  <circle fill="#79e2ff" cx="386" cy="286" r="18"/>
  <circle fill="#bfc8ff" cx="454" cy="286" r="18"/>
  <text class="small" x="312" y="328">回復、魔法、遠距離攻撃</text>
  <rect class="button" x="292" y="392" width="78" height="34" rx="3"/>
  <text class="small" x="314" y="414">編成</text>
  <rect class="button" x="386" y="392" width="78" height="34" rx="3"/>
  <text class="small" x="408" y="414">道具</text>
  <rect class="button" x="480" y="392" width="78" height="34" rx="3"/>
  <text class="small" x="502" y="414">BGM</text>

  <rect class="panel" x="632" y="70" width="320" height="390" rx="6"/>
  <text class="label" x="654" y="105">右: メイン画面</text>
  <rect class="soft" x="654" y="126" width="276" height="112" rx="4"/>
  <text class="text" x="674" y="156">街 / 探索先 / 敵</text>
  <text class="small" x="674" y="184">状況に応じて内容が変化</text>
  <rect class="soft" x="654" y="258" width="276" height="82" rx="4"/>
  <text class="text" x="674" y="288">戦闘コマンド</text>
  <text class="small" x="674" y="316">攻撃、魔法、回復、待機</text>
  <rect class="soft" x="654" y="362" width="276" height="66" rx="4"/>
  <text class="text" x="674" y="390">ログ</text>
  <text class="small" x="674" y="414">勝利、報酬、レベルアップ</text>

  <line class="arrow" x1="232" y1="480" x2="270" y2="480"/>
  <line class="arrow" x1="600" y1="480" x2="632" y2="480"/>
  <text class="small" x="344" y="486">内政で準備 → 探索 → 戦闘 → イベント</text>
</svg>
